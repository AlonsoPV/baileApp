<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://xjagwppplovcqmztcymd.supabase.co/storage/v1/object/public/media/icon.png" />
    <link rel="apple-touch-icon" href="https://xjagwppplovcqmztcymd.supabase.co/storage/v1/object/public/media/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- display=swap: texto visible antes; preconnect a Supabase se inyecta en build desde VITE_SUPABASE_URL -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>
    <!-- Evita zoom automático en focus (iOS/Android) y escalado inesperado en WebView -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body {
        background: #0b0d10;
        color: #ffffff;
        font-family: Inter, Poppins, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root, #overlay-root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      .route-fallback,
      .route-fallback--fullscreen {
        background: #0b0d10;
      }
      .route-fallback-fs-panel {
        width: 100%;
        max-width: 420px;
        padding: 1.5rem;
        border-radius: 16px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
      }
      .route-fallback-fs-bar {
        height: 14px;
        border-radius: 8px;
        background: rgba(255,255,255,0.1);
        margin-bottom: 1rem;
      }
      .route-fallback-fs-field {
        height: 48px;
        border-radius: 12px;
        background: rgba(255,255,255,0.06);
        margin-bottom: 12px;
      }
    </style>
    <title>Dónde Bailar | Clases, sociales y academias de baile en México</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="overlay-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
